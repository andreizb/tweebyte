# Server configuration
server.port=${SERVER_PORT:9092}
server.error.include-stacktrace=never
server.error.include-message=always

# R2DBC Database configuration
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:54322}/tweet_service_db
spring.r2dbc.username=postgres
spring.r2dbc.password=postgres

# Security configuration
app.security.jwt.keystore-location=keystore.jks
app.security.jwt.keystore-password=password
app.security.jwt.key-alias=tweebyte

# AI configuration
# We only use Spring AI's chat surface — exclude unused audio/image/embedding/etc.
# auto-configurations so they don't try to instantiate beans (and demand an API key)
# under mock backend or in tests.
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
app.ai.backend=${AI_BACKEND:mock}
app.ai.mock.ttft-mean-ms=${AI_MOCK_TTFT_MEAN_MS:250}
app.ai.mock.ttft-log-sigma=${AI_MOCK_TTFT_LOG_SIGMA:0.4}
app.ai.mock.itl-mean-ms=${AI_MOCK_ITL_MEAN_MS:40}
app.ai.mock.itl-gamma-shape=${AI_MOCK_ITL_GAMMA_SHAPE:2.5}
app.ai.mock.itl-p-burst=${AI_MOCK_ITL_P_BURST:0.0}
app.ai.mock.tokens-per-response=${AI_MOCK_TOKENS_PER_RESPONSE:150}
app.ai.mock.calibration-json=${AI_MOCK_CALIBRATION_JSON:}
# Live-LLM backend connection (used when app.ai.backend != mock).
# Default port 1234 matches LM Studio's default OpenAI-API server; for
# mlx_lm.server (the realism-subset backend in §5.13) override with
# LIVE_LLM_BASE_URL=http://host.docker.internal:8081.
# Default model identifier "qwen3.5-4b-mlx" matches the calibration source;
# override LIVE_LLM_MODEL for any other model.
spring.ai.openai.base-url=${LIVE_LLM_BASE_URL:http://localhost:1234}
spring.ai.openai.api-key=${LIVE_LLM_API_KEY:live-llm}
spring.ai.openai.chat.options.model=${LIVE_LLM_MODEL:qwen3.5-4b-mlx}
spring.ai.openai.chat.options.temperature=${LIVE_LLM_TEMPERATURE:0.7}
# Cap response length so per-request service time stays under the live
# backend's sustainable throughput ceiling. With Qwen3.5-4B-MLX-4bit on
# Apple Silicon (~3 s/200-token response under continuous batching of 8),
# max-tokens=200 keeps rps=1 cells comfortably below the queue-buildup
# regime described in §5.13.
spring.ai.openai.chat.options.max-tokens=${LIVE_LLM_MAX_TOKENS:200}

# Cache configuration
spring.data.redis.host=${CACHE_HOST:localhost}
spring.data.redis.port=${CACHE_PORT:63790}
spring.data.redis.repositories.enabled=false

# Client configuration
app.user.base-url=${USER_SERVICE_URL:http://localhost:9091}
app.interaction.base-url=${INTERACTION_SERVICE_URL:http://localhost:9093}

spring.r2dbc.pool.enabled=true

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=prometheus,health,info,metrics,health,circuitbreakers

resilience4j.circuitbreaker.configs.default.slidingWindowSize=1
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=1
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=1
resilience4j.circuitbreaker.configs.default.failureRateThreshold=100
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.followedIdsCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.followedIdsCircuitBreaker.waitDurationInOpenState=5000
