# Test profile that pins downstream URIs to a deliberately unreachable loopback port.
# The JWT integration tests only care whether the JWT filter accepts or rejects the
# request - they assert on 401 vs not-401, so the downstream never has to answer.
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://127.0.0.1:65530/
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=tweet-service
spring.cloud.gateway.routes[1].uri=http://127.0.0.1:65530/
spring.cloud.gateway.routes[1].predicates[0]=Path=/tweet-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=interaction-service
spring.cloud.gateway.routes[2].uri=http://127.0.0.1:65530/
spring.cloud.gateway.routes[2].predicates[0]=Path=/interaction-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
