# Suite configuration is owned by RunCucumberTest.java via @Suite +
# @SelectClasspathResource + @ConfigurationParameter. Do not set
# cucumber.features / cucumber.glue / cucumber.plugin here; the suite
# class is the only discovery source. Setting them here in addition
# would cause JUnit Platform to discover every scenario twice (once via
# this file's filesystem reference, once via the suite's classpath
# reference) and surefire would report twice the actual scenario count.
